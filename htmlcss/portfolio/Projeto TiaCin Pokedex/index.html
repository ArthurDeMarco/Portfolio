<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fun With Flags</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header class="text-center py-3">

        <img src="./assets/amg/fun with flags.png" style="max-width:200px">

    </header>

    <div class="busca-container">

        <div class="container d-flex gap-2">

            <input id="searchInput" class="form-control" placeholder="Busque por um país">

            <button id="searchButton" class="btn btn-danger">

                Buscar

            </button>

        </div>

    </div>

    <main class="container mt-4">

        <div id="dexContainer" class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-4">

        </div>

    </main>


    <!-- MODAL DETALHES -->

    <div class="modal fade" id="detailsModal">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title" id="modalTitle"></h5>

                    <button class="btn-close" data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body text-center" id="modalBody"></div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="flags.js"></script>

</body>

</html>
