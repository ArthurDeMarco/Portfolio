<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Desafio Bootstrap 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Meu Portfólio</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 shadow p-4 rounded bg-white">
                <h3 class="mb-4 text-center fw-bold">Fale Conosco</h3>

                <form id="meuFormulario" novalidate>
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="nome" required>
                        <div class="invalid-feedback">Por favor, digite seu nome.</div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" required>
                        <div class="invalid-feedback">Insira um e-mail válido.</div>
                    </div>

                    <div class="mb-3">
                        <label for="assunto" class="form-label">Assunto</label>
                        <select class="form-select" id="assunto" required>
                            <option value="" selected disabled>Escolha uma opção...</option>
                            <option value="1">Suporte Técnico</option>
                            <option value="2">Financeiro</option>
                            <option value="3">Sugestões</option>
                        </select>
                        <div class="invalid-feedback">Selecione um assunto.</div>
                    </div>

                    <div class="mb-3">
                        <label for="mensagem" class="form-label">Mensagem</label>
                        <textarea class="form-control" id="mensagem" rows="3" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold">Enviar Mensagem</button>
                </form>

                <div id="alertaSucesso" class="alert alert-success mt-3 d-none" role="alert">
                    Formulário enviado com sucesso! Entraremos em contato em breve.
                </div>
            </div>
        </div>
    </main>
    <script src="./validacao.js"></script>
</body>
