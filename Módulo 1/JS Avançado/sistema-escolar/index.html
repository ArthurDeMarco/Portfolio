<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema Escolar</title>
    <style>
        /* Um CSS básico para não ficar totalmente feio */
        body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 50px; }
        .login-card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; }
        #erro-login { color: red; font-size: 12px; height: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Login Escolar</h2>
        <input type="email" id="email" placeholder="Seu e-mail">
        <input type="password" id="senha" placeholder="Sua senha">
        
        <div id="erro-login"></div>
        
        <button onclick="realizarLogin()">Entrar</button>
    </div>

    <script src="Usuario.js"></script>
    <script src="Aluno.js"></script>
    <script src="Professor.js"></script>
    <script src="login.js"></script>
</body>
</html>
