<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Verificação Regex</title>
</head>

<body>
    <form id="formValidacao">
        <div class="campo">
            <label>Nome:</label>
            <input type="text" id="nome" placeholder="Ex: Arthur Silva">
            <span class="msg"></span>
        </div>

        <div class="campo">
            <label>Email:</label>
            <input type="email" id="email" placeholder="email@exemplo.com">
            <span class="msg"></span>
        </div>

        <div class="campo">
            <label>CPF:</label>
            <input type="text" id="cpf" placeholder="000.000.000-00">
            <span class="msg"></span>
        </div>

        <button type="submit">Validar</button>
    </form>
    <script src="main.js"></script>
</body>

</html>
